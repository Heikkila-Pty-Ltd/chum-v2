<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/style_plans.css">
</head>
<body>
  <div id="chrome">
    <header id="masthead">
      <div class="masthead-left">
        <h1 class="wordmark">CHUM<span class="wordmark-version">v2</span></h1>
        <nav id="main-nav" role="navigation">
          <a href="#/check" data-view="check" class="nav-link active">
            <span class="nav-key">1</span> Check
          </a>
          <a href="#/plan" data-view="plan" class="nav-link">
            <span class="nav-key">2</span> Plan
          </a>
          <a href="#/steer" data-view="steer" class="nav-link">
            <span class="nav-key">3</span> Steer
          </a>
          <a href="#/learn" data-view="learn" class="nav-link">
            <span class="nav-key">4</span> Learn
          </a>
          <a href="#/projects" data-view="projects" class="nav-link">
            <span class="nav-key">5</span> Projects
          </a>
        </nav>
      </div>
      <div class="masthead-right">
        <div id="project-selector"></div>
        <div id="live-indicator" class="indicator-idle" title="Auto-refresh paused">
          <span class="indicator-dot"></span>
          <span class="indicator-label">idle</span>
        </div>
      </div>
    </header>

    <main id="viewport"></main>
  </div>

  <div id="detail-panel" class="panel-closed" aria-hidden="true">
    <button id="panel-close" aria-label="Close panel">&times;</button>
    <div id="panel-content"></div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@dagrejs/dagre@1.1.4/dist/dagre.min.js"></script>
  <script>document.addEventListener('alpine:init', () => { window.__alpineReady = true; });</script>
  <script defer src="/vendor/alpine.min.js"></script>
  <script src="/app.js"></script>
  <script src="/views/overview.js"></script>
  <script src="/views/tasks.js"></script>
  <script src="/views/plans.js"></script>
  <script src="/views/check.js"></script>
  <script>App.init();</script>
</body>
</html>
