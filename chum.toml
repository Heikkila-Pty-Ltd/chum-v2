[general]
paused = true
tick_interval = "2m"
max_concurrent = 2
temporal_host_port = "localhost:7233"
temporal_namespace = "chum-v2"
task_queue = "chum-v2-tasks"
db_path = "chum.db"
matrix_webhook_url = ""
matrix_room_id = ""
matrix_access_token = ""
matrix_homeserver = "https://matrix.org"
dolt_health_check_enabled = true
dolt_health_check_interval = "30s"
dolt_data_dir = ".beads/dolt/beads_chum"
dolt_host = "127.0.0.1"
dolt_port = 3307
jarvis_port = 9780

[beads_bridge]
enabled = true
dry_run = false
canary_label = "chum-canary"
reconcile_interval = "15m"
ingress_policy = "beads_only"

[projects.chum]
enabled = true
workspace = "/home/ubuntu/projects/chum-factory"
dod_checks = ["go build ./...", "go test ./...", "go vet ./..."]

[providers.claude]
cli = "claude"
model = "claude-sonnet-4-20250514"
reviewer = "gemini"
enabled = true
tier = "balanced"

[providers.gemini]
cli = "gemini"
model = "gemini-2.5-flash"
reviewer = "claude"
enabled = false
tier = "fast"

[tiers]
fast = ["gemini"]
balanced = ["claude"]
premium = []
