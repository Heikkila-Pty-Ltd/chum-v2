[general]
paused = false
tick_interval = "4m"
max_concurrent = 2
max_review_rounds = 3
require_cross_provider_review = false
temporal_host_port = "localhost:7233"
temporal_namespace = "chum-v2"
task_queue = "chum-v2-tasks"
db_path = "chum.db"
matrix_webhook_url = ""
matrix_room_id = ""
matrix_access_token = ""
matrix_homeserver = "https://matrix.org"
dolt_health_check_enabled = true
dolt_health_check_interval = "2m"
dolt_data_dir = ".beads/dolt/beads_chum"
dolt_host = "127.0.0.1"
dolt_port = 3307
jarvis_port = 9780
jarvis_kb_path = "/home/ubuntu/.picoclaw/bots/jarvis/jarvis.db"

[beads_bridge]
enabled = false
dry_run = false
canary_label = "chum-canary"
reconcile_interval = "15m"
ingress_policy = "legacy"

[projects.chum]
enabled = true
workspace = "/home/ubuntu/projects/chum-automation"
dod_checks = ["go build ./...", "go test ./...", "go vet ./..."]

[projects.hg]
enabled = false
workspace = "/home/ubuntu/projects/hg-chum-integration-automation"
dod_checks = ["go build ./...", "go vet ./..."]

[projects.kaikki]
enabled = true
workspace = "/home/ubuntu/projects/kaikki"
dod_checks = ["npm test"]

[providers.gemini]
cli = "gemini"
model = "gemini-2.5-flash"
reviewer = "codex"
enabled = true
tier = "fast"

[providers.codex]
cli = "codex"
model = ""
reviewer = "gemini"
enabled = true
tier = "balanced"

[tiers]
fast = ["gemini"]
balanced = ["gemini", "codex"]
premium = ["codex"]
